- name: copy catalogue service
  ansible.builtin.template:     #so here before we used copy but now we should use template because we stored catalouge.service file in template. and by templates we can easily do chnages in template only by using variables.
    src: catalogue.service.j2   #here we should use  catalogue.service.j2  --.j2 because we are using jinja2 there and the file name also catalogue.service.j2 so.
    dest: /etc/systemd/system/catalogue.service
  tags:
    name: run service

- name: systemctl deamon reload
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: start and enable catalogue
  ansible.builtin.service:
    name: catalogue
    state: started
    enabled: yes
  tags:
    - systemctl
    